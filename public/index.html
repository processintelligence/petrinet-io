<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" href="./app.css">
</head>

<body>

  <div id="container"></div>

  <div class="top-right-buttons pnjs-buttons">
    <div>
      <div>layout</div>
      <div>
        <button id="js-auto-layout-sugiyama" class="pnjs-buttons-active" title="run Sugiyama layout">
          Sugiyama
        </button>
      </div>
      <div>
        <button id="js-auto-layout-circular" class="pnjs-buttons-active" title="run Circular layout">
          Circular
        </button>
      </div>
    </div>
    <div>
      <div>load</div>
      <div>
        <button id="js-load-melanoma-treatment" class="pnjs-buttons-active" title="load Melanoma_Treatment PN">
          Melanoma
        </button>
      </div>
      <div>
        <button id="js-load-model-23" class="pnjs-buttons-active" title="load model (23) PN">
          Model 23
        </button>
      </div>
    </div>
  </div>

  <div class="bottom-buttons pnjs-buttons">
    <div>
      <div>open</div>
      <div><button id="js-open-pnml" class="pnjs-buttons-active" title="open PNML file">PNML file</button></div>
    </div>

    <div>
      <div>download</div>
      <div><button id="js-download-pnml" class="pnjs-buttons-active" title="download PNML file">PNML file</button></div>
      <div><button id="js-download-tpn" class="pnjs-buttons-active" title="download as TPN file">TPN file</button></div>
      <div><button id="js-download-svg" class="pnjs-buttons-active" title="download as SVG image">SVG image</button></div>
      <div><button id="js-download-pdf" class="pnjs-buttons-active" title="download as PDF file">PDF file</button></div>
    </div>
  </div>
  <script data-goatcounter="https://processintelligence.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>

</html>
